<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segurança Social | Autenticação Digital</title>
    <style>
        :root { --ss-yellow: #FDC82F; --ss-blue: #003366; --bg: #F4F7F9; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: var(--bg); text-align: center; }
        header { background-color: var(--ss-yellow); padding: 25px; font-weight: bold; font-size: 1.5em; border-bottom: 12px solid var(--ss-blue); }
        .container { max-width: 500px; margin: 40px auto; padding: 30px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 18px; border: 2px solid #ddd; border-radius: 4px; font-size: 1.1em; text-align: center; font-weight: bold; margin-bottom: 20px; outline-color: var(--ss-blue); }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 4px; font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 16px; display: block; text-decoration: none; }
        .btn-validate { background-color: var(--ss-yellow); color: #000; }
        .btn-download { background-color: #c00; color: white; margin-top: 20px; display: none; }
        #errorArea { display: none; color: #c00; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<header>SEGURANÇA SOCIAL</header>

<div class="container">
    <div id="searchArea">
        <h1>Autenticação</h1>
        <p>Introduza o código para validar o documento.</p>
        <input type="text" id="codigo" placeholder="Digite o código aqui" autocomplete="off" onkeydown="if(event.key==='Enter') validate()">
        <button type="button" class="btn btn-validate" onclick="validate()">Validar Documento</button>
        <p id="errorArea">Código inválido ou ficheiro não encontrado.</p>
    </div>

    <div id="resultArea" style="display: none;">
        <div style="background: #d4edda; color: #155724; padding: 15px; border-radius: 4px; font-weight: bold; margin-bottom: 20px;">✓ DOCUMENTO AUTÊNTICO</div>
        <p>Código Verificado: <span id="res-code" style="font-weight: bold;"></span></p>
        <a href="#" id="pdfLink" class="btn btn-download" target="_blank">ABRIR DOCUMENTO ORIGINAL</a>
        <button onclick="window.location.reload()" style="background:none; border:none; color:blue; cursor:pointer; text-decoration:underline; margin-top:20px;">Validar outro</button>
    </div>
</div>

<script>
    const PDF_BASE = "https://engstrodrigo-bot.github.io/portal-seg.com-1/";

    const permitidos = [
        "13-5mfs-9rdx-btv8-0",
        "14-3kwp-1n8j-mds6-2",
        "15-9hly-6xbt-zqc4-7",
        "16-1vtw-4nbm-lhy2-9",
        "17-4zrn-8kgp-kgp5-3",
        "21-5jqr-4m2z-zqc6-4",
        "4-7mfs-3g6l-hdj8-1",
        "5-2kwp-9rdx-btv6-3",
        "6-5hly-4nbm-zqc7-0",
        "7-1vtw-8kgp-mds4-6",
        "8-4zrn-6xbt-lhy9-5"
    ];

    async function validate() {
        const input = document.getElementById('codigo').value.trim().toLowerCase();
        const errorArea = document.getElementById('errorArea');
        const pdfLink = document.getElementById('pdfLink');

        errorArea.style.display = 'none';

        if (!permitidos.includes(input)) {
            errorArea.innerText = 'Código inválido ou não autorizado.';
            errorArea.style.display = 'block';
            return;
        }

        const url = PDF_BASE + input + ".pdf";
        const check = await fetch(url, { method: 'HEAD' });

        if (check.ok) {
            document.getElementById('searchArea').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('res-code').innerText = input;
            pdfLink.href = url + "?v=" + new Date().getTime();
            pdfLink.style.display = 'block';
        } else {
            errorArea.innerText = "Ficheiro não encontrado. Tente novamente em alguns minutos.";
            errorArea.style.display = 'block';
        }
    }
</script>
</body>
</html>
