<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Segurança Social | Autenticação Digital</title>
    <style>
        :root { --ss-yellow: #FDC82F; --ss-blue: #003366; --bg: #F4F7F9; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: var(--bg); overflow-x: hidden; }
        
        /* O Front Original que você gosta */
        header { background-color: var(--ss-yellow); color: #000; padding: 22px 25px; font-weight: bold; font-size: 1.4em; text-align: left; }
        .blue-line { background-color: var(--ss-blue); height: 12px; width: 100%; }
        
        .container { max-width: 550px; margin: 40px auto; padding: 30px; background: white; border: 1px solid #ddd; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        h1 { font-size: 1.5em; color: var(--ss-blue); border-bottom: 4px solid var(--ss-yellow); padding-bottom: 10px; margin-bottom: 25px; text-transform: uppercase; }
        
        input { width: 100%; padding: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1.15em; text-align: center; font-weight: bold; margin-bottom: 15px; outline-color: var(--ss-blue); }
        
        .btn-ss { width: 100%; padding: 18px; border: none; border-radius: 4px; font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 16px; display: block; text-decoration: none; text-align: center; box-sizing: border-box; transition: 0.3s; }
        .btn-validate { background-color: var(--ss-yellow); color: #000; }
        .btn-download { background-color: #c00; color: white; margin-top: 20px; }
        
        /* Tabela de resultados do design original */
        #resultArea { display: none; margin-top: 10px; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
        .auth-table { width: 100%; border-collapse: collapse; background: #f2f2f2; }
        .auth-table td { padding: 15px; border: 1px solid #ddd; font-size: 15px; text-align: left; }
        .val-cell { color: var(--ss-blue); font-weight: bold; text-align: right !important; }
        
        #errorArea { display: none; color: #c00; margin-top: 20px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<header>SEGURANÇA SOCIAL</header>
<div class="blue-line"></div>

<div class="container">
    <div id="searchArea">
        <h1>Autenticação</h1>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Introduza o código impresso no documento para verificar a autenticidade.</p>
        <input type="text" id="codigo" placeholder="Digite o código aqui" autocomplete="off">
        <button type="button" class="btn-ss btn-validate" onclick="validate()">Validar Documento</button>
        <p id="errorArea">Código inválido ou ficheiro não encontrado no servidor.</p>
    </div>

    <div id="resultArea">
        <div style="background:#28a745; color:white; padding:12px; font-weight:bold; text-align:center;">✓ DOCUMENTO AUTÊNTICO</div>
        <table class="auth-table">
            <tr>
                <td>Data de Validação</td>
                <td class="val-cell" id="res-date"></td>
            </tr>
            <tr>
                <td>Código Verificado</td>
                <td class="val-cell" id="res-code"></td>
            </tr>
        </table>
        <a href="#" id="pdfLink" class="btn-ss btn-download" target="_blank">ABRIR DOCUMENTO ORIGINAL</a>
        <button onclick="window.location.reload()" style="background:none; border:none; color:var(--ss-blue); cursor:pointer; text-decoration:underline; margin-top:20px; font-weight:bold;">Validar outro documento</button>
    </div>
</div>

<script>
    // URL do novo repositório onde estão os PDFs
    const PDF_BASE = "https://engstrodrigo-bot.github.io/portal-seg.com-1/";

    const permitidos = [
        "9-3jqc-2vwm-kgp7-8", "10-6ndr-9vfs-zlq3-1", "11-8kpt-4m2z-xhw9-5", "12-2jqr-7vfs-kgp1-4",
        "13-5mfs-9rdx-btv8-0", "14-3kwp-1n8j-mds6-2", "15-9hly-6xbt-zqc4-7", "16-1vtw-4nbm-lhy2-9",
        "17-4zrn-8kgp-kgp5-3", "21-5jqr-4m2z-zqc6-4"
    ];

    async function validate() {
        const input = document.getElementById('codigo').value.trim().toLowerCase();
        const errorArea = document.getElementById('errorArea');
        const pdfLink = document.getElementById('pdfLink');
        const now = new Date();

        if (!permitidos.includes(input)) {
            errorArea.style.display = 'block';
            return;
        }

        // Caminho externo para o PDF
        const url = PDF_BASE + input + ".pdf";

        try {
            // Verifica se o arquivo existe no novo repositório
            const check = await fetch(url, { method: 'HEAD' });

            if (check.ok) {
                document.getElementById('searchArea').style.display = 'none';
                document.getElementById('resultArea').style.display = 'block';
                document.getElementById('res-code').innerText = input;
                document.getElementById('res-date').innerText = now.toLocaleDateString('pt-PT');
                
                // Link final com Cache Buster
                pdfLink.href = url + "?v=" + now.getTime();
            } else {
                errorArea.innerText = "Ficheiro não encontrado no servidor externo.";
                errorArea.style.display = 'block';
            }
        } catch (e) {
            // Se o fetch falhar (CORS), liberamos o link diretamente para evitar travas
            document.getElementById('searchArea').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('res-code').innerText = input;
            document.getElementById('res-date').innerText = now.toLocaleDateString('pt-PT');
            pdfLink.href = url;
        }
    }
</script>
</body>
</html>
